<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>工具管理</title>
<style>
body{
    font-family: Arial;
    margin: 30px;
}
table{
    border-collapse: collapse;
    width: 100%;
}
th, td{
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}
input{
    width: 90px;
}
input.name{
    width: 140px;
}
input.location{
    width: 120px;
}
</style>
</head>

<body>

<h1>工具管理</h1>

<h2>新增工具</h2>

<form action="/add_tool" method="post">
    工具名稱：
    <input type="text" name="name" required>

    總數量：
    <input type="number" name="total_quantity" min="0" required>

    位置：
    <input type="text" name="location">

    <button type="submit">新增</button>
</form>

<hr>

<table>
<tr>
    <th>工地</th>
    <th>工具</th>
    <th>總數</th>
    <th>可借</th>
    <th>位置</th>
    <th>狀態</th>
    <th>儲存</th>
    <th>刪除</th>
</tr>

{% for tool in tools %}
<tr>
<form action="/update_site_tool/{{ tool['site_tool_id'] }}" method="post">

    <td>{{ tool["site_name"] }}</td>

    <td>
        <input class="name" type="text" name="name" value="{{ tool['name'] }}" required>
    </td>

    <td>
        <input type="number" name="total_quantity" value="{{ tool['total_quantity'] }}" min="0">
    </td>

    <td>
        <input type="number" name="available_quantity" value="{{ tool['available_quantity'] }}" min="0">
    </td>

    <td>
        <input class="location" type="text" name="location" value="{{ tool['location'] }}">
    </td>

    <td>
        <select name="status">
            <option value="正常" {% if tool["status"]=="正常" %}selected{% endif %}>正常</option>
            <option value="維修中" {% if tool["status"]=="維修中" %}selected{% endif %}>維修中</option>
            <option value="報廢" {% if tool["status"]=="報廢" %}selected{% endif %}>報廢</option>
        </select>
    </td>

    <td>
        <button type="submit">儲存</button>
    </td>

</form>

<td>
    <a href="/delete_tool/{{ tool['tool_id'] }}" onclick="return confirm('確定要刪除這個工具嗎？');">
        <button>刪除</button>
    </a>
</td>

</tr>
{% endfor %}
</table>

<br>

<a href="/admin">
<button>返回後台</button>
</a>

</body>
</html>
