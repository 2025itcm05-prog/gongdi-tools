<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>工地借物管理系統</title>
<style>

body{
    font-family: Arial,"微軟正黑體";
    font-size:32px;
    margin:30px;
}

h1{
    font-size:52px;
}

h2{
    font-size:42px;
}

h3{
    font-size:36px;
}

p{
    font-size:32px;
}

a{
    font-size:32px;
}

button{
    font-size:32px;
    padding:15px 35px;
    margin:8px;
}

input{
    font-size:32px;
    padding:12px;
}

select{
    font-size:32px;
    padding:12px;
}

table{
    font-size:30px;
    border-collapse:collapse;
}

th,td{
    padding:15px;
}

</style>
</head>
<body>

<h1>工地借物管理系統 V2.3</h1>

<h2>請選擇工地</h2>

<form action="/site" method="get">
    <select name="site_id" required>
        {% for site in sites %}
            <option value="{{ site['id'] }}">
                {{ site["name"] }}
            </option>
        {% endfor %}
    </select>

    <br><br>

    <button type="submit">進入工地</button>
</form>

<br>

<a href="/admin_login">
    <button>管理員登入</button>
</a>

</body>
</html>
