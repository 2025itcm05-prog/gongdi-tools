<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>管理員登入</title>
<style>

body{
    font-family: Arial,"微軟正黑體";
    font-size:32px;
    margin:30px;
}

h1{
    font-size:52px;
}

h2{
    font-size:42px;
}

h3{
    font-size:36px;
}

p{
    font-size:32px;
}

a{
    font-size:32px;
}

button{
    font-size:32px;
    padding:15px 35px;
    margin:8px;
}

input{
    font-size:32px;
    padding:12px;
}

select{
    font-size:32px;
    padding:12px;
}

table{
    font-size:30px;
    border-collapse:collapse;
}

th,td{
    padding:15px;
}

</style>
</head>
<body>

<h1>管理員登入</h1>

<form action="/admin_login" method="post">
    <p>
        帳號：
        <input type="text" name="username" required>
    </p>

    <p>
        密碼：
        <input type="password" name="password" required>
    </p>

    <button type="submit">登入</button>
</form>

<br>

<a href="/">返回首頁</a>

</body>
</html>
