<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>借用人搜尋結果</title>
<style>

body{
    font-family: Arial,"微軟正黑體";
    font-size:32px;
    margin:30px;
}

h1{
    font-size:52px;
}

h2{
    font-size:42px;
}

h3{
    font-size:36px;
}

p{
    font-size:32px;
}

a{
    font-size:32px;
}

button{
    font-size:32px;
    padding:15px 35px;
    margin:8px;
}

input{
    font-size:32px;
    padding:12px;
}

select{
    font-size:32px;
    padding:12px;
}

table{
    font-size:30px;
    border-collapse:collapse;
}

th,td{
    padding:15px;
}

</style>
</head>

<body>

{% if user %}

<h2>找到借用人</h2>

<p>姓名：{{ user["name"] }}</p>

<p>手機：{{ user["phone"] }}</p>

<a href="/borrow/{{ user['id'] }}">
<button>開始借工具</button>
</a>

<br><br>

<a href="/search">
<button>返回搜尋</button>
</a>

{% else %}

<h2>找不到借用人</h2>

<form action="/add_user" method="post">

<input type="hidden"
name="site_id"
value="{{ site_id }}">

<p>

姓名

<br>

<input
type="text"
name="name"
required>

</p>

<p>

手機

<br>

<input
type="text"
name="phone"
value="{{ phone }}"
required>

</p>

<button type="submit">

新增借用人

</button>

</form>

<br>

<a href="/search">

<button>

返回搜尋

</button>

</a>

{% endif %}

</body>
</html>
